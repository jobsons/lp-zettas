<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120" width="100%" height="100%">
  <!-- Definições de Gradientes -->
  <defs>
    <!-- Gradiente da seta superior (Azul) -->
    <linearGradient id="gradBlue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1C5C9A" />
      <stop offset="100%" stop-color="#0F3B6D" />
    </linearGradient>
    
    <!-- Gradiente da seta inferior (Verde) -->
    <linearGradient id="gradGreen" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2CB34A" />
      <stop offset="100%" stop-color="#1DAE4B" />
    </linearGradient>
  </defs>

  <!-- Símbolo / Ícone (Setas formando o "Z") -->
  <g transform="translate(20, 10)">
    <!-- Seta Superior Azul -->
    <path d="M 60 10 L 20 10 L 10 25 L 20 40 L 50 40 L 30 70 L 40 70 L 70 25 Z" fill="url(#gradBlue)" />
    <!-- Seta Inferior Verde -->
    <path d="M 20 80 L 60 80 L 70 65 L 60 50 L 30 50 L 50 20 L 40 20 L 10 65 Z" fill="url(#gradGreen)" />
    
    <!-- Traços de circuito simplificados (Seta Azul) -->
    <path d="M 25 25 L 45 25 L 55 15" fill="none" stroke="white" stroke-width="1.5" />
    <circle cx="25" cy="25" r="2" fill="white" />
    <circle cx="55" cy="15" r="2" fill="white" />
    
    <!-- Traços de circuito simplificados (Seta Verde) -->
    <path d="M 55 65 L 35 65 L 25 75" fill="none" stroke="white" stroke-width="1.5" />
    <circle cx="55" cy="65" r="2" fill="white" />
    <circle cx="25" cy="75" r="2" fill="white" />

    <!-- Ícone WhatsApp no canto direito -->
    <g transform="translate(65, 60)">
      <circle cx="8" cy="8" r="8" fill="#2CB34A" />
      <path d="M 5 11 L 4 12 L 4.5 10.5 C 3.5 9.5 3.5 8 4.5 7 C 6 5.5 8 5.5 9.5 7 C 11 8.5 11 10.5 9.5 11.5 C 8.5 12.5 7 12.5 6 12 L 5 11 Z" fill="none" stroke="white" stroke-width="1" />
    </g>
  </g>

  <!-- Texto Principal -->
  <text x="110" y="70" font-family="system-ui, -apple-system, sans-serif" font-size="48" font-weight="900" fill="#0F3B6D" letter-spacing="2">ZETTAS</text>
  
  <!-- Slogan -->
  <text x="115" y="90" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="500" fill="#0F3B6D" letter-spacing="1.5">AUTOMAÇÃO INTELIGENTE PARA WHATSAPP</text>
</svg>